spring:
  application:
    name: attendance

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:attendance}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-development-only-change-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  servlet:
    context-path: /api
